server:
  port: 8888
spring:
  application:
    name: config-service
  boot:
    admin:
      client:
        url: http://spring-admin-ct.lab.pl/
        instance: ${HOSTNAME}
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations: file:///tmp/microservices/config/
management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
